<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Blood Doctor CoagVision</title>
    <meta
      http-equiv="refresh"
      content="0; url=./docs/index.html"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fff7f2 0%, #f8fafc 100%);
        color: #0f172a;
      }

      .card {
        width: min(640px, calc(100% - 2rem));
        padding: 2rem;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.6;
        color: #475569;
      }

      a {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.9rem 1.1rem;
        border-radius: 16px;
        background: #8b1e3f;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Blood Doctor CoagVision</h1>
      <p>The most reliable way to open the website is the one-click launcher in this folder.</p>
      <p>Use <code>Open Blood Doctor CoagVision.command</code>. If you prefer a manual route, you can still open <code>docs/index.html</code>.</p>
      <a href="./docs/index.html">Open docs/index.html</a>
    </main>
  </body>
</html>
